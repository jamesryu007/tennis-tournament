name: 출첵 Poll Scheduler

on:
  # 스케줄 비활성화 — pollState 자동 오픈/마감은 Firebase Cloud Function이 담당
  # autoOpenCheckin: 월요일 08:30 KST / notifyCheckinClose: 금요일 12:00 KST
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - open
          - close

jobs:
  update-poll-state:
    runs-on: ubuntu-latest
    steps:
      - name: Update Firebase pollState
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          MANUAL_ACTION: ${{ github.event.inputs.action }}
        run: |
          python3 << 'EOF'
          from datetime import datetime, timedelta, timezone
          import json, os, urllib.request, urllib.error

          utc_now = datetime.now(timezone.utc).replace(tzinfo=None)
          kst_now = utc_now + timedelta(hours=9)
          weekday = kst_now.weekday()  # 0=월, 4=금

          manual = os.environ.get('MANUAL_ACTION', '')
          action = manual if manual in ('open', 'close') else ('open' if weekday == 0 else 'close')

          db_url = os.environ['FIREBASE_DB_URL'].rstrip('/')
          db_secret = os.environ['FIREBASE_DB_SECRET']
          url = f"{db_url}/jmt/pollState.json?auth={db_secret}"

          if action == 'open':
              days_to_sat = (5 - weekday) % 7
              if days_to_sat == 0:
                  days_to_sat = 7
              sat_date = kst_now + timedelta(days=days_to_sat)
              iso = kst_now.isocalendar()
              week_id = f"{iso[0]}-W{iso[1]:02d}"
              payload = {
                  'status': 'open',
                  'weekId': week_id,
                  'satDate': sat_date.strftime('%Y-%m-%d'),
                  'openedAt': utc_now.strftime('%Y-%m-%dT%H:%M:%SZ')
              }
              method = 'PUT'   # 새 주차 시작: 전체 교체
          else:
              # close: weekId/satDate 보존하고 status만 업데이트 (PATCH)
              payload = {
                  'status': 'closed',
                  'closedAt': utc_now.strftime('%Y-%m-%dT%H:%M:%SZ')
              }
              method = 'PATCH'  # 기존 필드 유지하며 부분 업데이트

          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(url, data=data, method=method)
          req.add_header('Content-Type', 'application/json')

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"✅ Action: {action}")
                  print(f"Payload: {json.dumps(payload, ensure_ascii=False, indent=2)}")
                  print(f"Response: {resp.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"❌ HTTP Error: {e.code} {e.reason}")
              print(e.read().decode())
              exit(1)
          except Exception as e:
              print(f"❌ Error: {type(e).__name__}: {e}")
              exit(1)
          EOF
