<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#d4f54a"/>
      <stop offset="45%" style="stop-color:#aadd00"/>
      <stop offset="100%" style="stop-color:#7ab800"/>
    </radialGradient>
    <radialGradient id="ballHighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.45)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="ballShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="rgba(0,80,0,0.35)"/>
    </filter>
    <clipPath id="ballClip">
      <circle cx="144" cy="130" r="66"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <ellipse cx="200" cy="130" rx="160" ry="80" fill="rgba(255,255,255,0.07)"/>

  <!-- 테니스공 -->
  <g filter="url(#ballShadow)">
    <circle cx="144" cy="130" r="66" fill="url(#ballGrad)"/>
    <g clip-path="url(#ballClip)">
      <path d="M 110 68 C 88 90, 88 118, 100 130 C 112 142, 112 162, 96 182"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
      <path d="M 178 78 C 200 100, 200 128, 188 140 C 176 152, 176 170, 192 188"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
    </g>
    <circle cx="144" cy="130" r="66" fill="url(#ballHighlight)"/>
  </g>

  <!-- 와인잔 (크기 키움: scale 1.35) -->
  <g transform="translate(278, 28) scale(1.35)" filter="url(#shadow)">
    <path d="M 24 10 L 8 58 Q 6 82 46 82 Q 86 82 84 58 L 68 10 Z"
      fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
    <path d="M 14 40 Q 12 72 46 72 Q 80 72 78 40 Z" fill="rgba(220,38,127,0.55)"/>
    <rect x="42" y="82" width="8" height="38" fill="rgba(255,255,255,0.7)" rx="3"/>
    <rect x="24" y="118" width="44" height="7" fill="rgba(255,255,255,0.7)" rx="3.5"/>
  </g>

  <!-- JAMITE 텍스트 -->
  <text x="256" y="295"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="88" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="4"
    filter="url(#shadow)">JAMITE</text>

  <!-- TENNIS 서브텍스트 -->
  <text x="256" y="348"
    font-family="'Arial', sans-serif"
    font-size="28" font-weight="600"
    fill="rgba(255,255,255,0.75)"
    text-anchor="middle" letter-spacing="6">TENNIS</text>

  <!-- 😊 스마일 표현 (눈 두 점 + 웃는 곡선) -->
  <!-- 왼쪽 눈 -->
  <circle cx="158" cy="372" r="8" fill="rgba(255,255,255,0.75)"/>
  <!-- 오른쪽 눈 -->
  <circle cx="354" cy="372" r="8" fill="rgba(255,255,255,0.75)"/>
  <!-- 웃는 입 -->
  <path d="M 148 392 Q 256 460 364 392"
    fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round"/>

</svg>
